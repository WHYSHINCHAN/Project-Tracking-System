<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Project - College Project Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Header Section -->
  <header>
    <nav>
      <a href="/" class="logo">Project<span>Hub</span></a>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/projects">Projects</a></li>
        <li><a href="/tasks">Tasks</a></li>
        <li><a href="/calendar">Calendar</a></li>
      </ul>
      <div class="auth-buttons">
        <a href="/profile" class="btn btn-secondary">
          <i class="fas fa-user"></i> {{ username }}
        </a>
        <a href="/logout" class="btn btn-primary">Logout</a>
      </div>
      <div class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
  </header>

  <!-- Create Project Form -->
  <div class="auth-container" style="max-width: 600px;">
    <h2>Create New Project</h2>
    <form action="/create-project" method="post">
      <div class="form-group">
        <label for="title">Project Title</label>
        <input type="text" id="title" name="title" required>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" required></textarea>
      </div>
      <div class="form-group">
        <label for="deadline">Deadline</label>
        <input type="date" id="deadline" name="deadline" required>
      </div>
      <div class="form-group">
        <label for="type">Project Type</label>
        <select id="type" name="type">
          <option value="research">Research Paper</option>
          <option value="presentation">Presentation</option>
          <option value="assignment">Assignment</option>
          <option value="lab">Lab Report</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Team Members (Optional)</label>
        <div class="team-member-input">
          <input type="email" name="team_members[]" placeholder="Enter team member email">
          <button type="button" class="btn btn-secondary add-member-btn">Add More</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Create Project</button>
    </form>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    // Add team member fields dynamically
    document.querySelector('.add-member-btn').addEventListener('click', function() {
      const container = document.querySelector('.team-member-input');
      const input = document.createElement('input');
      input.type = 'email';
      input.name = 'team_members[]';
      input.placeholder = 'Enter team member email';
      container.insertBefore(input, this);
    });
    
    // Set minimum date for deadline
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const formattedDate = tomorrow.toISOString().split('T')[0];
    document.getElementById('deadline').min = formattedDate;
  </script>
</body>
</html>
